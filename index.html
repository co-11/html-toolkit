<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML ToolKit</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome (アイコン用) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (ブラウザ内でJSXをコンパイルするため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Utility Functions ---

    // 正規表現のエスケープ
    const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

    // クリップボードへのコピー
    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0";
      textArea.style.left = "0";
      textArea.style.position = "fixed";
      
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
      } catch (err) {
        console.error('コピーに失敗しました', err);
      }
      document.body.removeChild(textArea);
    };

    // ファイルダウンロード機能
    const downloadFile = (filename, content) => {
      if (!content) return;
      const element = document.createElement("a");
      const file = new Blob([content], { type: 'text/plain' });
      element.href = URL.createObjectURL(file);
      element.download = filename;
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    };

    // HTMLからCSSとJSを抽出して分解する
    const decomposeHtml = (source, cssFilename = 'style.css', jsFilename = 'script.js') => {
      let css = [];
      let js = [];
      let html = source || '';
      
      html = html.replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, (match, p1) => {
        if (p1.trim()) css.push(p1.trim());
        return '';
      });

      html = html.replace(/<script(?:(?!\bsrc=)[^>])*>([\s\S]*?)<\/script>/gi, (match, p1) => {
        if (p1.trim()) js.push(p1.trim());
        return '';
      });

      const finalCss = css.join('\n\n').trim();
      const finalJs = js.join('\n\n').trim();

      if (finalCss) {
        const linkTag = `<link rel="stylesheet" href="${cssFilename}">`;
        if (html.match(/<\/head>/i)) {
          html = html.replace(/<\/head>/i, `  ${linkTag}\n</head>`);
        } else {
          html = `${linkTag}\n${html}`;
        }
      }

      if (finalJs) {
        const scriptTag = `<script src="${jsFilename}"><\/script>`;
        if (html.match(/<\/body>/i)) {
          html = html.replace(/<\/body>/i, `  ${scriptTag}\n</body>`);
        } else {
          html = `${html}\n${scriptTag}`;
        }
      }

      return {
        html: html.trim(),
        css: finalCss,
        js: finalJs
      };
    };

    // HTML, CSS, JSを1つのHTMLに結合する
    const composeHtml = (html, css, jsList, cssFilename) => {
      let result = html || '';
      
      // 動的なファイル名に基づいて外部読み込みタグを削除する
      if (cssFilename) {
        // ./style.css などのパス付きにも対応
        const cssRegex = new RegExp(`<link[^>]*href=["'][^"']*?(?:\\/)?${escapeRegExp(cssFilename)}["'][^>]*>\\n?`, 'gi');
        result = result.replace(cssRegex, '');
      }
      
      jsList.forEach(js => {
        if (js.filename) {
          // type="module" や ./app.js などのパス付きスクリプトタグも確実に削除
          const jsRegex = new RegExp(`<script[^>]*src=["'][^"']*?(?:\\/)?${escapeRegExp(js.filename)}["'][^>]*><\\/script>\\n?`, 'gi');
          result = result.replace(jsRegex, '');
        }
      });
      
      const combinedJs = jsList.map(j => {
        let content = j.content.trim();
        
        // --- モジュール構文 (import/export) の削除・無害化をさらに強化 ---
        
        // 1. import文の削除
        content = content.replace(/import\s+[\s\S]*?from\s+['"][^'"]+['"]\s*;?/g, '');
        content = content.replace(/import\s+['"][^'"]+['"]\s*;?/g, '');
        
        // 2. export文の無害化・削除
        // export { ... } [from '...']; を丸ごと削除
        content = content.replace(/export\s+\{[\s\S]*?\}\s*(?:from\s+['"][^'"]+['"]\s*)?;?/g, '');
        // export * from '...'; を丸ごと削除
        content = content.replace(/export\s+\*\s+from\s+['"][^'"]+['"]\s*;?/g, '');
        // export default を削除
        content = content.replace(/export\s+default\s+/g, '');
        // export async function などの修飾子付きに対応
        content = content.replace(/export\s+(async\s+function)\b/g, '$1');
        // 基本的な export 宣言の修飾子 (const, let, var, function, class) を削除して中身を残す
        content = content.replace(/export\s+(const|let|var|function|class)\b/g, '$1');

        return content.trim();
      }).filter(Boolean).join('\n\n');

      if (css && css.trim()) {
        const styleTag = `<style>\n${css.trim()}\n<\/style>`;
        if (result.match(/<\/head>/i)) {
          result = result.replace(/<\/head>/i, `${styleTag}\n</head>`);
        } else {
          result = `${styleTag}\n${result}`;
        }
      }

      if (combinedJs && combinedJs.trim()) {
        const scriptTag = `<script>\n${combinedJs.trim()}\n<\/script>`;
        if (result.match(/<\/body>/i)) {
          result = result.replace(/<\/body>/i, `${scriptTag}\n</body>`);
        } else {
          result = `${result}\n${scriptTag}`;
        }
      }

      return result.trim();
    };

    // --- Components ---

    const Icon = ({ name, size = 16, className = "" }) => (
      <i className={`${name} ${className}`} style={{ fontSize: size }}></i>
    );

    const EditorPanel = ({ label, iconName, value, onChange, readOnly, placeholder, className = "", filename, onFilenameChange, onImport, accept, showRemove, onRemove, showMoveUp, onMoveUp, showMoveDown, onMoveDown }) => {
      const [copied, setCopied] = useState(false);
      const fileInputRef = useRef(null);

      const handleCopy = () => {
        if (!value) return;
        copyToClipboard(value);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const handleDownload = () => {
        if (!value || !filename) return;
        downloadFile(filename, value);
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          if (onImport) onImport(event.target.result, file.name);
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      return (
        <div className={`flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden ${className}`}>
          <div className="flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gray-50/50">
            <div className="flex items-center gap-2 text-gray-700 font-medium">
              <Icon name={iconName} size={16} className="text-blue-500" />
              {label && <span className="text-sm text-gray-500">{label}</span>}
              {filename !== undefined && (
                <input
                  type="text"
                  value={filename}
                  onChange={(e) => onFilenameChange && onFilenameChange(e.target.value)}
                  className="bg-transparent border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none text-sm px-1 py-0.5 w-32 font-bold text-gray-800"
                  title="ファイル名を編集"
                />
              )}
            </div>
            <div className="flex items-center gap-1">
              {showMoveUp && (
                <button
                  onClick={onMoveUp}
                  className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-md transition-colors"
                  title="上に移動"
                >
                  <Icon name="fa-solid fa-arrow-up" />
                </button>
              )}
              {showMoveDown && (
                <button
                  onClick={onMoveDown}
                  className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-md transition-colors"
                  title="下に移動"
                >
                  <Icon name="fa-solid fa-arrow-down" />
                </button>
              )}
              {onImport && (
                <>
                  <input type="file" accept={accept} onChange={handleFileChange} ref={fileInputRef} className="hidden" />
                  <button
                    onClick={() => fileInputRef.current?.click()}
                    className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-md transition-colors"
                    title="ファイルから読み込む"
                  >
                    <Icon name="fa-solid fa-folder-open" />
                  </button>
                </>
              )}
              {filename && (
                <button
                  onClick={handleDownload}
                  disabled={!value}
                  className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                  title={`${filename} としてダウンロード`}
                >
                  <Icon name="fa-solid fa-download" />
                </button>
              )}
              {showRemove && (
                <button
                  onClick={onRemove}
                  className="p-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors"
                  title="このパネルを削除"
                >
                  <Icon name="fa-solid fa-trash" />
                </button>
              )}
              <button
                onClick={handleCopy}
                disabled={!value}
                className="p-1.5 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                title="クリップボードにコピー"
              >
                {copied ? <Icon name="fa-solid fa-check" className="text-green-500" /> : <Icon name="fa-regular fa-copy" />}
              </button>
            </div>
          </div>
          <textarea
            value={value}
            onChange={(e) => onChange && onChange(e.target.value)}
            readOnly={readOnly}
            placeholder={placeholder}
            spellCheck={false}
            className={`flex-1 w-full p-4 font-mono text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500/50 bg-transparent text-gray-800 ${readOnly ? 'bg-gray-50/30' : ''}`}
          />
        </div>
      );
    };

    // --- Main App Component ---

    function App() {
      const [mode, setMode] = useState('decompose');
      
      // ファイル名の状態管理
      const [decomposeInputFilename, setDecomposeInputFilename] = useState('index.html');
      const [decomposeHtmlFilename, setDecomposeHtmlFilename] = useState('index.html');
      const [decomposeCssFilename, setDecomposeCssFilename] = useState('style.css');
      const [decomposeJsFilename, setDecomposeJsFilename] = useState('script.js');

      const [composeOutputFilename, setComposeOutputFilename] = useState('index.html');
      const [composeHtmlFilename, setComposeHtmlFilename] = useState('index.html');
      const [composeCssFilename, setComposeCssFilename] = useState('style.css');

      const [inputCombined, setInputCombined] = useState('');
      const [inputSplitHtml, setInputSplitHtml] = useState('');
      const [inputSplitCss, setInputSplitCss] = useState('');
      const [inputSplitJsList, setInputSplitJsList] = useState([{ id: Date.now(), content: '', filename: 'script.js' }]);

      const bulkInputRef = useRef(null);

      useEffect(() => {
        const decomposed = decomposeHtml(inputCombined, decomposeCssFilename, decomposeJsFilename);
        setInputSplitHtml(decomposed.html);
        setInputSplitCss(decomposed.css);
        setInputSplitJsList([{ id: Date.now(), content: decomposed.js, filename: decomposeJsFilename }]);
      }, []);

      const updateJs = (id, content) => {
        setInputSplitJsList(prev => prev.map(item => item.id === id ? { ...item, content } : item));
      };

      const updateJsFilename = (id, filename) => {
        setInputSplitJsList(prev => prev.map(item => item.id === id ? { ...item, filename } : item));
      };

      const addJsPanel = () => {
        setInputSplitJsList(prev => [...prev, { id: Date.now(), content: '', filename: `script${prev.length + 1}.js` }]);
      };

      const removeJsPanel = (id) => {
        setInputSplitJsList(prev => prev.filter(item => item.id !== id));
      };

      const moveJsPanel = (index, direction) => {
        setInputSplitJsList(prev => {
          const newList = [...prev];
          if (direction === 'up' && index > 0) {
            [newList[index - 1], newList[index]] = [newList[index], newList[index - 1]];
          } else if (direction === 'down' && index < newList.length - 1) {
            [newList[index], newList[index + 1]] = [newList[index + 1], newList[index]];
          }
          return newList;
        });
      };

      const handleModeToggle = (newMode) => {
        if (newMode === mode) return;

        if (newMode === 'compose') {
          const decomposed = decomposeHtml(inputCombined, decomposeCssFilename, decomposeJsFilename);
          setInputSplitHtml(decomposed.html);
          setInputSplitCss(decomposed.css);
          setInputSplitJsList([{ id: Date.now(), content: decomposed.js, filename: decomposeJsFilename }]);
        } else {
          const composed = composeHtml(inputSplitHtml, inputSplitCss, inputSplitJsList, composeCssFilename);
          setInputCombined(composed);
        }
        setMode(newMode);
      };

      // 結合モード：一括インポート処理
      const handleBulkImport = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        const readAsText = (file) => new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (event) => resolve({ name: file.name, text: event.target.result });
          reader.readAsText(file);
        });

        const fileDataArray = await Promise.all(files.map(readAsText));
        let jsFiles = [];

        fileDataArray.forEach(({ name, text }) => {
          const ext = name.split('.').pop().toLowerCase();
          if (ext === 'html') {
            setInputSplitHtml(text);
            setComposeHtmlFilename(name);
          } else if (ext === 'css') {
            setInputSplitCss(text);
            setComposeCssFilename(name);
          } else if (ext === 'js') {
            jsFiles.push({ name, text });
          }
        });

        if (jsFiles.length > 0) {
          setInputSplitJsList(prev => {
            if (prev.length === 1 && prev[0].content === '') {
              return jsFiles.map((f, i) => ({ id: Date.now() + i, content: f.text, filename: f.name }));
            } else {
              return [
                ...prev,
                ...jsFiles.map((f, i) => ({ id: Date.now() + i, content: f.text, filename: f.name }))
              ];
            }
          });
        }
        e.target.value = null; // リセット
      };

      // 結合モード：JSの自動並び替え処理 (import文を解析して依存関係順にソート)
      const handleAutoSortJs = () => {
        if (inputSplitJsList.length <= 1) return;

        const nodes = new Map();
        // データの初期化 (ファイル名をキーにして情報を保持)
        inputSplitJsList.forEach(js => {
          // JSのファイル名が重複していると上書きされるため、ユニークな識別子にする
          nodes.set(js.filename, { item: js, dependencies: [] });
        });

        const importRegex = /import\s+[\s\S]*?from\s+['"]([^'"]+)['"]/g;
        const importRegex2 = /import\s+['"]([^'"]+)['"]/g;

        // 依存関係の抽出
        inputSplitJsList.forEach(js => {
          const deps = new Set();
          let match;
          const content = js.content;
          
          while ((match = importRegex.exec(content)) !== null) {
            const depFilename = match[1].split('/').pop(); // './core.js' -> 'core.js'
            if (nodes.has(depFilename)) deps.add(depFilename);
          }
          
          while ((match = importRegex2.exec(content)) !== null) {
            const depFilename = match[1].split('/').pop();
            if (nodes.has(depFilename)) deps.add(depFilename);
          }

          const node = nodes.get(js.filename);
          deps.forEach(depFilename => {
            if (depFilename !== js.filename) { // 自己依存を防ぐ
              node.dependencies.push(depFilename);
            }
          });
        });

        // トポロジカルソート用グラフの構築
        const graph = new Map();
        const inDegree = new Map();
        nodes.forEach((_, filename) => {
          graph.set(filename, []);
          inDegree.set(filename, 0);
        });

        // 依存先(A)が依存元(B)より先に来る必要がある -> エッジは A から B へ引く
        nodes.forEach((node, filename) => {
          node.dependencies.forEach(dep => {
            if (graph.has(dep)) {
              graph.get(dep).push(filename);
              inDegree.set(filename, inDegree.get(filename) + 1);
            }
          });
        });

        const queue = [];
        inDegree.forEach((degree, filename) => {
          if (degree === 0) queue.push(filename);
        });

        const sortedFilenames = [];
        while (queue.length > 0) {
          const current = queue.shift();
          sortedFilenames.push(current);
          graph.get(current).forEach(neighbor => {
            inDegree.set(neighbor, inDegree.get(neighbor) - 1);
            if (inDegree.get(neighbor) === 0) {
              queue.push(neighbor);
            }
          });
        }

        // 循環参照等によりソートできなかったファイルがある場合は末尾に追加
        const sortedSet = new Set(sortedFilenames);
        inputSplitJsList.forEach(js => {
          if (!sortedSet.has(js.filename)) {
            sortedFilenames.push(js.filename);
            console.warn(`[Auto Sort] 循環依存の可能性があります: ${js.filename}`);
          }
        });

        // ソート結果を反映
        const sortedList = sortedFilenames.map(filename => nodes.get(filename).item);
        setInputSplitJsList(sortedList);
      };

      const derivedDecomposed = mode === 'decompose' 
        ? decomposeHtml(inputCombined, decomposeCssFilename, decomposeJsFilename) 
        : { html: '', css: '', js: '' };
      
      const derivedComposed = mode === 'compose' 
        ? composeHtml(inputSplitHtml, inputSplitCss, inputSplitJsList, composeCssFilename) 
        : '';

      const handleDownloadAll = () => {
        if (derivedDecomposed.html) downloadFile(decomposeHtmlFilename, derivedDecomposed.html);
        if (derivedDecomposed.css) {
          setTimeout(() => downloadFile(decomposeCssFilename, derivedDecomposed.css), 200);
        }
        if (derivedDecomposed.js) {
          setTimeout(() => downloadFile(decomposeJsFilename, derivedDecomposed.js), 400);
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-900 p-4 md:p-8 font-sans transition-colors duration-200">
          <div className="max-w-7xl mx-auto space-y-6">
            
            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div>
                <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-gray-900 flex items-center gap-3">
                  <Icon name="fa-solid fa-code" className="text-blue-500" size={28} />
                  HTML ToolKit
                </h1>
                <p className="text-sm text-gray-500 mt-1">
                  インラインHTMLの分解と、HTML/CSS/JSの結合を行うユーティリティ
                </p>
              </div>

              <div className="flex bg-gray-200/50 p-1 rounded-lg border border-gray-200">
                <button
                  onClick={() => handleModeToggle('decompose')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${
                    mode === 'decompose' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900'
                  }`}
                >
                  <Icon name="fa-solid fa-arrows-split-up-and-left" />
                  分解モード
                </button>
                <button
                  onClick={() => handleModeToggle('compose')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${
                    mode === 'compose' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900'
                  }`}
                >
                  <Icon name="fa-solid fa-object-group" />
                  結合モード
                </button>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[calc(100vh-180px)] min-h-[600px]">
              
              {/* --- 分解モード --- */}
              {mode === 'decompose' && (
                <>
                  <EditorPanel
                    label="入力HTML"
                    filename={decomposeInputFilename}
                    onFilenameChange={setDecomposeInputFilename}
                    iconName="fa-solid fa-file-code"
                    value={inputCombined}
                    onChange={setInputCombined}
                    onImport={(content, name) => {
                      setInputCombined(content);
                      if (name) setDecomposeInputFilename(name);
                    }}
                    accept=".html,.txt"
                    placeholder="ここに <style> や <script> を含むHTMLを貼り付けてください..."
                    className="h-full"
                  />
                  
                  <div className="flex flex-col gap-4 h-full">
                    <div className="flex items-center justify-between">
                      <span className="text-sm font-bold text-gray-700">抽出されたファイル</span>
                      <button
                        onClick={handleDownloadAll}
                        disabled={!derivedDecomposed.html && !derivedDecomposed.css && !derivedDecomposed.js}
                        className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm"
                        title="3つのファイルを一括でダウンロード"
                      >
                        <Icon name="fa-solid fa-cloud-arrow-down" />
                        一括ダウンロード
                      </button>
                    </div>
                    <EditorPanel
                      filename={decomposeHtmlFilename}
                      onFilenameChange={setDecomposeHtmlFilename}
                      iconName="fa-brands fa-html5"
                      value={derivedDecomposed.html}
                      readOnly={true}
                      className="flex-1 min-h-0"
                    />
                    <EditorPanel
                      filename={decomposeCssFilename}
                      onFilenameChange={setDecomposeCssFilename}
                      iconName="fa-brands fa-css3-alt"
                      value={derivedDecomposed.css}
                      readOnly={true}
                      className="flex-1 min-h-0"
                    />
                    <EditorPanel
                      filename={decomposeJsFilename}
                      onFilenameChange={setDecomposeJsFilename}
                      iconName="fa-brands fa-js"
                      value={derivedDecomposed.js}
                      readOnly={true}
                      className="flex-1 min-h-0"
                    />
                  </div>
                </>
              )}

              {/* --- 結合モード --- */}
              {mode === 'compose' && (
                <>
                  <div className="flex flex-col gap-4 h-full overflow-y-auto pr-2 pb-2">
                    <div className="flex items-center justify-between pb-1">
                      <span className="text-sm font-bold text-gray-700">結合するファイル群</span>
                      <div className="flex items-center gap-2">
                        <button
                          onClick={handleAutoSortJs}
                          disabled={inputSplitJsList.length <= 1}
                          className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-500 hover:bg-blue-600 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm"
                          title="JSのimport文を解析して依存関係の順に並び替えます"
                        >
                          <Icon name="fa-solid fa-wand-magic-sparkles" />
                          自動並び替え
                        </button>
                        <button
                          onClick={() => bulkInputRef.current?.click()}
                          className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-md transition-colors shadow-sm"
                          title="複数ファイルをまとめて読み込みます"
                        >
                          <Icon name="fa-solid fa-file-import" />
                          一括インポート
                        </button>
                      </div>
                      <input type="file" multiple accept=".html,.css,.js,.txt" onChange={handleBulkImport} className="hidden" ref={bulkInputRef} />
                    </div>

                    <EditorPanel
                      filename={composeHtmlFilename}
                      onFilenameChange={setComposeHtmlFilename}
                      iconName="fa-brands fa-html5"
                      value={inputSplitHtml}
                      onChange={setInputSplitHtml}
                      onImport={(content, name) => {
                        setInputSplitHtml(content);
                        if (name) setComposeHtmlFilename(name);
                      }}
                      accept=".html,.txt"
                      placeholder="HTMLコードを入力..."
                      className="min-h-[250px] flex-shrink-0"
                    />
                    <EditorPanel
                      filename={composeCssFilename}
                      onFilenameChange={setComposeCssFilename}
                      iconName="fa-brands fa-css3-alt"
                      value={inputSplitCss}
                      onChange={setInputSplitCss}
                      onImport={(content, name) => {
                        setInputSplitCss(content);
                        if (name) setComposeCssFilename(name);
                      }}
                      accept=".css,.txt"
                      placeholder="CSSコードを入力..."
                      className="min-h-[250px] flex-shrink-0"
                    />
                    
                    {inputSplitJsList.map((jsItem, index) => (
                      <EditorPanel
                        key={jsItem.id}
                        filename={jsItem.filename}
                        onFilenameChange={(val) => updateJsFilename(jsItem.id, val)}
                        iconName="fa-brands fa-js"
                        value={jsItem.content}
                        onChange={(val) => updateJs(jsItem.id, val)}
                        onImport={(content, name) => {
                          updateJs(jsItem.id, content);
                          if (name) updateJsFilename(jsItem.id, name);
                        }}
                        accept=".js,.txt"
                        showRemove={inputSplitJsList.length > 1}
                        onRemove={() => removeJsPanel(jsItem.id)}
                        showMoveUp={index > 0}
                        onMoveUp={() => moveJsPanel(index, 'up')}
                        showMoveDown={index < inputSplitJsList.length - 1}
                        onMoveDown={() => moveJsPanel(index, 'down')}
                        placeholder="JavaScriptコードを入力..."
                        className="min-h-[250px] flex-shrink-0"
                      />
                    ))}
                    
                    <button
                      onClick={addJsPanel}
                      className="flex items-center justify-center gap-2 w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-xl hover:bg-gray-50 hover:border-gray-400 hover:text-gray-700 transition-colors font-medium flex-shrink-0"
                    >
                      <Icon name="fa-solid fa-plus" />
                      JavaScriptファイルを追加
                    </button>
                  </div>

                  <EditorPanel
                    label="出力HTML"
                    filename={composeOutputFilename}
                    onFilenameChange={setComposeOutputFilename}
                    iconName="fa-solid fa-file-code"
                    value={derivedComposed}
                    readOnly={true}
                    className="h-full"
                  />
                </>
              )}
              
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
