<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML ToolKit</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f9fafb; --panel:#fff; --border:#e5e7eb; --border-soft:#f3f4f6;
  --head:#fafafa; --text:#111827; --muted:#6b7280; --faint:#9ca3af;
  --accent:#2563eb; --accent-h:#1d4ed8; --accent-soft:#3b82f6;
  --green:#16a34a; --green-h:#15803d; --red:#ef4444; --red-soft:#fee2e2;
  --hover:#f3f4f6; --shadow:0 1px 2px rgba(0,0,0,.05); --radius:12px;
}
[data-theme="dark"] {
  --bg:#0f172a; --panel:#1e293b; --border:#334155; --border-soft:#243045;
  --head:#19243b; --text:#f1f5f9; --muted:#94a3b8; --faint:#64748b;
  --accent:#3b82f6; --accent-h:#60a5fa; --accent-soft:#3b82f6;
  --green:#22c55e; --green-h:#16a34a; --red:#f87171; --red-soft:#3f1d1d;
  --hover:#334155; --shadow:0 1px 2px rgba(0,0,0,.3);
}
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .2s,color .2s; }
.wrap { max-width:1280px; margin:0 auto; padding:24px 16px; }
@media(min-width:768px){ .wrap{ padding:32px; } }
.header { display:flex; flex-direction:column; gap:16px; justify-content:space-between; margin-bottom:24px; }
@media(min-width:768px){ .header{ flex-direction:row; align-items:center; } }
.title { font-size:24px; font-weight:700; display:flex; align-items:center; gap:12px; letter-spacing:-.02em; }
.title .logo { font-size:28px; }
.subtitle { font-size:13px; color:var(--muted); margin-top:4px; }
.controls { display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
.toggle { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500; color:var(--text); cursor:pointer; background:var(--panel); padding:8px 12px; border-radius:8px; border:1px solid var(--border); box-shadow:var(--shadow); }
.toggle input { width:16px; height:16px; cursor:pointer; accent-color:var(--accent); }
.icon-toggle { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:8px 11px; cursor:pointer; box-shadow:var(--shadow); font-size:15px; line-height:1; }
.icon-toggle:hover { background:var(--hover); }
.modes { display:flex; background:var(--border-soft); padding:4px; border-radius:8px; border:1px solid var(--border); }
.mode-btn { display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; color:var(--muted); background:transparent; border:none; cursor:pointer; transition:all .15s; font-family:inherit; }
.mode-btn.active { background:var(--panel); color:var(--accent); box-shadow:var(--shadow); }
.mode-btn:not(.active):hover { color:var(--text); }
.grid { display:grid; grid-template-columns:1fr; gap:24px; height:calc(100vh - 180px); min-height:600px; }
@media(min-width:1024px){ .grid{ grid-template-columns:1fr 1fr; } }
.col { display:flex; flex-direction:column; gap:16px; height:100%; }
.col.scroll { overflow-y:auto; padding-right:8px; padding-bottom:8px; }
.col-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.col-head .label { font-size:13px; font-weight:700; color:var(--text); }
.panel { display:flex; flex-direction:column; background:var(--panel); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; }
.panel.fill { height:100%; }
.panel.flex1 { flex:1; min-height:0; }
.panel.block { min-height:250px; flex-shrink:0; }
.panel-head { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border-soft); background:var(--head); }
.panel-head .left { display:flex; align-items:center; gap:8px; color:var(--text); font-weight:500; min-width:0; }
.panel-head .picon { font-size:15px; }
.panel-head .plabel { font-size:13px; color:var(--muted); }
.fname { background:transparent; border:none; border-bottom:1px solid transparent; font-size:13px; font-weight:700; color:var(--text); padding:2px 4px; width:128px; font-family:inherit; }
.fname:hover { border-bottom-color:var(--border); }
.fname:focus { outline:none; border-bottom-color:var(--accent); }
.panel-head .right { display:flex; align-items:center; gap:2px; }
.iconbtn { background:transparent; border:none; color:var(--faint); padding:6px; border-radius:6px; cursor:pointer; font-size:14px; line-height:1; transition:all .15s; }
.iconbtn:hover { color:var(--text); background:var(--hover); }
.iconbtn:disabled { opacity:.4; cursor:not-allowed; }
.iconbtn.danger { color:var(--red); }
.iconbtn.danger:hover { background:var(--red-soft); }
.iconbtn.copied { color:var(--green); }
.ta { flex:1; width:100%; padding:14px; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:13px; line-height:1.5; resize:none; border:none; background:transparent; color:var(--text); }
.ta:focus { outline:none; box-shadow:inset 0 0 0 2px rgba(37,99,235,.4); }
.ta[readonly] { background:rgba(0,0,0,.015); }
[data-theme="dark"] .ta[readonly] { background:rgba(255,255,255,.02); }
.panel-foot { display:flex; justify-content:flex-end; gap:16px; padding:6px 12px; border-top:1px solid var(--border-soft); background:var(--head); font-size:11px; color:var(--faint); font-family:ui-monospace,monospace; user-select:none; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 12px; font-size:13px; font-weight:500; border-radius:6px; border:none; cursor:pointer; color:#fff; box-shadow:var(--shadow); transition:background .15s; font-family:inherit; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-blue { background:var(--accent); }
.btn-blue:hover:not(:disabled) { background:var(--accent-h); }
.btn-soft { background:var(--accent-soft); }
.btn-green { background:var(--green); }
.btn-green:hover:not(:disabled) { background:var(--green-h); }
.addbtn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; border:2px dashed var(--border); color:var(--muted); background:transparent; border-radius:var(--radius); cursor:pointer; font-weight:500; font-size:13px; flex-shrink:0; transition:all .15s; font-family:inherit; }
.addbtn:hover { background:var(--hover); border-color:var(--faint); color:var(--text); }
.hidden { display:none; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  /* ===== Config ===== */
  const ICONS = {
    app:'🧰', input:'📄', html:'🌐', css:'🎨', js:'📜', output:'📦',
    copy:'📋', copied:'✅', download:'⬇️', importFile:'📂', bulk:'📥',
    trash:'🗑️', up:'↑', down:'↓', sort:'🪄', add:'＋',
    decompose:'✂️', compose:'🧩', composeJs:'📜', sun:'☀️', moon:'🌙'
  };

  /* ===== Store ===== */
  const state = {
    mode:'decompose',
    removeComments:false,
    theme:'light',
    decomposeInput:'',
    decomposeInputFilename:'index.html',
    decomposeHtmlFilename:'index.html',
    decomposeCssFilename:'style.css',
    decomposeJsFilename:'script.js',
    composeHtml:'',
    composeCss:'',
    composeHtmlFilename:'index.html',
    composeCssFilename:'style.css',
    composeOutputFilename:'index.html',
    composeJsOutputFilename:'bundle.js',
    jsList:[{ id:Date.now(), content:'', filename:'script.js' }]
  };
  let currentPanels = [];

  /* ===== Utils ===== */
  const escapeRegExp = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const stripHtmlComments = (s) => s.replace(/<!--[\s\S]*?-->/g, '');
  const stripCssComments = (s) => s.replace(/\/\*[\s\S]*?\*\//g, '');
  const stripJsComments = (s) => s.replace(/\/\*[\s\S]*?\*\//g, '').replace(/(?<!:)\/\/.*$/gm, '');

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.top = '0'; ta.style.left = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }
  function copyToClipboard(text) {
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else { fallbackCopy(text); }
  }
  function downloadFile(filename, content) {
    if (!content) return;
    const a = document.createElement('a');
    const blob = new Blob([content], { type:'text/plain' });
    a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
  function el(tag, props, children) {
    props = props || {};
    const node = document.createElement(tag);
    for (const k in props) {
      const v = props[k];
      if (k === 'class') node.className = v;
      else if (k === 'html') node.innerHTML = v;
      else if (k.slice(0,2) === 'on' && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v !== null && v !== undefined && v !== false) node.setAttribute(k, v);
    }
    const kids = Array.isArray(children) ? children : (children != null ? [children] : []);
    kids.forEach((c) => { if (c == null || c === false) return; node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    return node;
  }

  // --- core: HTMLを HTML/CSS/JS に分解 ---
  function decomposeHtml(source, cssFilename, jsFilename, removeComments) {
    cssFilename = cssFilename || 'style.css'; jsFilename = jsFilename || 'script.js';
    let css = [], js = [], html = source || '';
    if (removeComments) html = stripHtmlComments(html);
    html = html.replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, (m, p1) => { if (p1.trim()) css.push(p1.trim()); return ''; });
    html = html.replace(/<script(?:(?!\bsrc=)[^>])*>([\s\S]*?)<\/script>/gi, (m, p1) => { if (p1.trim()) js.push(p1.trim()); return ''; });
    let finalCss = css.join('\n\n').trim(), finalJs = js.join('\n\n').trim();
    if (removeComments) { finalCss = stripCssComments(finalCss); finalJs = stripJsComments(finalJs); }
    if (finalCss) {
      const linkTag = `<link rel="stylesheet" href="${cssFilename}">`;
      if (html.match(/<\/head>/i)) html = html.replace(/<\/head>/i, `  ${linkTag}\n</head>`);
      else html = `${linkTag}\n${html}`;
    }
    if (finalJs) {
      const scriptTag = `<script src="${jsFilename}"><\/script>`;
      if (html.match(/<\/body>/i)) html = html.replace(/<\/body>/i, `  ${scriptTag}\n</body>`);
      else html = `${html}\n${scriptTag}`;
    }
    return { html: html.trim(), css: finalCss, js: finalJs };
  }

  // --- core: 複数 JS をモジュール構文除去のうえ結合 ---
  function composeJs(jsList, removeComments) {
    return jsList.map((j) => {
      let content = j.content.trim();
      if (removeComments) content = stripJsComments(content);
      content = content.replace(/import\s+[\s\S]*?from\s+['"][^'"]+['"]\s*;?/g, '');
      content = content.replace(/import\s+['"][^'"]+['"]\s*;?/g, '');
      content = content.replace(/export\s+\{[\s\S]*?\}\s*(?:from\s+['"][^'"]+['"]\s*)?;?/g, '');
      content = content.replace(/export\s+\*\s+from\s+['"][^'"]+['"]\s*;?/g, '');
      content = content.replace(/export\s+default\s+/g, '');
      content = content.replace(/export\s+(async\s+function)\b/g, '$1');
      content = content.replace(/export\s+(const|let|var|function|class)\b/g, '$1');
      return content.trim();
    }).filter(Boolean).join('\n\n');
  }

  // --- core: HTML/CSS/JS群を1つのHTMLに結合 ---
  function composeHtml(html, css, jsList, cssFilename, removeComments) {
    let result = html || '';
    if (removeComments) result = stripHtmlComments(result);
    if (cssFilename) {
      const cssRegex = new RegExp(`<link[^>]*href=["'][^"']*?(?:\\/)?${escapeRegExp(cssFilename)}["'][^>]*>\\n?`, 'gi');
      result = result.replace(cssRegex, '');
    }
    jsList.forEach((js) => {
      if (js.filename) {
        const jsRegex = new RegExp(`<script[^>]*src=["'][^"']*?(?:\\/)?${escapeRegExp(js.filename)}["'][^>]*><\\/script>\\n?`, 'gi');
        result = result.replace(jsRegex, '');
      }
    });
    const combinedJs = composeJs(jsList, removeComments);
    let finalCss = css ? css.trim() : '';
    if (removeComments && finalCss) finalCss = stripCssComments(finalCss);
    if (finalCss) {
      const styleTag = `<style>\n${finalCss}\n<\/style>`;
      if (result.match(/<\/head>/i)) result = result.replace(/<\/head>/i, `${styleTag}\n</head>`);
      else result = `${styleTag}\n${result}`;
    }
    if (combinedJs && combinedJs.trim()) {
      const scriptTag = `<script>\n${combinedJs.trim()}\n<\/script>`;
      if (result.match(/<\/body>/i)) result = result.replace(/<\/body>/i, `${scriptTag}\n</body>`);
      else result = `${result}\n${scriptTag}`;
    }
    return result.trim();
  }

  // --- core: import解析による依存順トポロジカルソート ---
  function sortJsList(jsList) {
    if (jsList.length <= 1) return jsList;
    const nodes = new Map();
    jsList.forEach((js) => nodes.set(js.filename, { item: js, dependencies: [] }));
    const importRegex = /import\s+[\s\S]*?from\s+['"]([^'"]+)['"]/g;
    const importRegex2 = /import\s+['"]([^'"]+)['"]/g;
    jsList.forEach((js) => {
      const deps = new Set(); let match; const content = js.content;
      while ((match = importRegex.exec(content)) !== null) { const d = match[1].split('/').pop(); if (nodes.has(d)) deps.add(d); }
      while ((match = importRegex2.exec(content)) !== null) { const d = match[1].split('/').pop(); if (nodes.has(d)) deps.add(d); }
      const node = nodes.get(js.filename);
      deps.forEach((d) => { if (d !== js.filename) node.dependencies.push(d); });
    });
    const graph = new Map(), inDegree = new Map();
    nodes.forEach((_, f) => { graph.set(f, []); inDegree.set(f, 0); });
    nodes.forEach((node, f) => { node.dependencies.forEach((dep) => { if (graph.has(dep)) { graph.get(dep).push(f); inDegree.set(f, inDegree.get(f) + 1); } }); });
    const queue = []; inDegree.forEach((d, f) => { if (d === 0) queue.push(f); });
    const sorted = [];
    while (queue.length) { const cur = queue.shift(); sorted.push(cur); graph.get(cur).forEach((n) => { inDegree.set(n, inDegree.get(n) - 1); if (inDegree.get(n) === 0) queue.push(n); }); }
    const set = new Set(sorted);
    jsList.forEach((js) => { if (!set.has(js.filename)) { sorted.push(js.filename); console.warn(`[Auto Sort] 循環依存の可能性があります: ${js.filename}`); } });
    return sorted.map((f) => nodes.get(f).item);
  }

  /* ===== Panels ===== */
  function makeCounts() {
    const line = el('span', {}, '0 行');
    const char = el('span', {}, '0 文字');
    const foot = el('div', { class:'panel-foot' }, [line, char]);
    return { foot, line, char };
  }
  function setCounts(c, value) {
    const v = value || '';
    const lines = v === '' ? 0 : v.split('\n').length;
    c.line.textContent = lines + ' 行';
    c.char.textContent = v.length + ' 文字';
  }

  function EditorPanel(cfg) {
    const counts = makeCounts();
    const ta = el('textarea', { class:'ta', spellcheck:'false', placeholder: cfg.placeholder || '' });
    if (cfg.readOnly) ta.setAttribute('readonly', '');
    ta.value = cfg.readOnly ? (cfg.compute ? cfg.compute() : '') : (cfg.initial || '');
    if (!cfg.readOnly && cfg.onChange) ta.addEventListener('input', () => cfg.onChange(ta.value));

    const left = el('div', { class:'left' }, [ el('span', { class:'picon' }, cfg.icon || '') ]);
    if (cfg.label) left.appendChild(el('span', { class:'plabel' }, cfg.label));
    let fnameInput = null;
    if (cfg.filename !== undefined) {
      fnameInput = el('input', { class:'fname', type:'text', title:'ファイル名を編集', value: cfg.filename });
      if (cfg.onFilename) fnameInput.addEventListener('input', () => cfg.onFilename(fnameInput.value));
      left.appendChild(fnameInput);
    }

    const right = el('div', { class:'right' });
    if (cfg.showUp) right.appendChild(el('button', { class:'iconbtn', title:'上に移動', onClick: cfg.onUp }, ICONS.up));
    if (cfg.showDown) right.appendChild(el('button', { class:'iconbtn', title:'下に移動', onClick: cfg.onDown }, ICONS.down));
    if (cfg.onImport) {
      const file = el('input', { class:'hidden', type:'file', accept: cfg.accept || '' });
      file.addEventListener('change', (e) => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => cfg.onImport(ev.target.result, f.name);
        r.readAsText(f); e.target.value = null;
      });
      right.appendChild(el('button', { class:'iconbtn', title:'ファイルから読み込む', onClick: () => file.click() }, ICONS.importFile));
      right.appendChild(file);
    }
    if (cfg.filename !== undefined) {
      right.appendChild(el('button', { class:'iconbtn', title:'ダウンロード', onClick: () => downloadFile(fnameInput ? fnameInput.value : cfg.filename, ta.value) }, ICONS.download));
    }
    if (cfg.showRemove) right.appendChild(el('button', { class:'iconbtn danger', title:'このパネルを削除', onClick: cfg.onRemove }, ICONS.trash));
    const copyBtn = el('button', { class:'iconbtn', title:'クリップボードにコピー' }, ICONS.copy);
    copyBtn.addEventListener('click', () => {
      if (!ta.value) return;
      copyToClipboard(ta.value);
      copyBtn.textContent = ICONS.copied; copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = ICONS.copy; copyBtn.classList.remove('copied'); }, 2000);
    });
    right.appendChild(copyBtn);

    const head = el('div', { class:'panel-head' }, [left, right]);
    const panel = el('div', { class:'panel ' + (cfg.className || '') }, [head, ta, counts.foot]);
    setCounts(counts, ta.value);

    currentPanels.push({ refresh: () => { if (cfg.readOnly && cfg.compute) ta.value = cfg.compute(); setCounts(counts, ta.value); } });
    return panel;
  }

  /* ===== Main ===== */
  function updateOutputs() { currentPanels.forEach((p) => p.refresh()); }

  function updateJs(id, content) { const it = state.jsList.find((x) => x.id === id); if (it) it.content = content; updateOutputs(); }
  function updateJsFilename(id, filename) { const it = state.jsList.find((x) => x.id === id); if (it) it.filename = filename; updateOutputs(); }
  function updateJsAndSort(id, content, filename) {
    const it = state.jsList.find((x) => x.id === id);
    if (it) { it.content = content; if (filename) it.filename = filename; }
    state.jsList = sortJsList(state.jsList);
    render(); updateOutputs();
  }
  function addJsPanel() { state.jsList.push({ id: Date.now(), content:'', filename:`script${state.jsList.length + 1}.js` }); render(); updateOutputs(); }
  function removeJsPanel(id) { state.jsList = state.jsList.filter((x) => x.id !== id); render(); updateOutputs(); }
  function moveJsPanel(index, dir) {
    const l = state.jsList;
    if (dir === 'up' && index > 0) { const t = l[index - 1]; l[index - 1] = l[index]; l[index] = t; }
    else if (dir === 'down' && index < l.length - 1) { const t = l[index + 1]; l[index + 1] = l[index]; l[index] = t; }
    render(); updateOutputs();
  }
  function handleBulkImport(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    const readAsText = (file) => new Promise((res) => { const r = new FileReader(); r.onload = (ev) => res({ name: file.name, text: ev.target.result }); r.readAsText(file); });
    Promise.all(files.map(readAsText)).then((arr) => {
      let jsFiles = [];
      arr.forEach(({ name, text }) => {
        const ext = name.split('.').pop().toLowerCase();
        if (state.mode === 'compose') {
          if (ext === 'html') { state.composeHtml = text; state.composeHtmlFilename = name; }
          else if (ext === 'css') { state.composeCss = text; state.composeCssFilename = name; }
          else if (ext === 'js') { jsFiles.push({ name, text }); }
        } else if (state.mode === 'compose-js') {
          if (ext === 'js' || ext === 'txt') { jsFiles.push({ name, text }); }
        }
      });
      if (jsFiles.length) {
        let newList;
        if (state.jsList.length === 1 && state.jsList[0].content === '') {
          newList = jsFiles.map((f, i) => ({ id: Date.now() + i, content: f.text, filename: f.name }));
        } else {
          newList = state.jsList.concat(jsFiles.map((f, i) => ({ id: Date.now() + i, content: f.text, filename: f.name })));
        }
        state.jsList = sortJsList(newList);
      }
      e.target.value = null;
      render(); updateOutputs();
    });
  }
  function handleModeToggle(newMode) {
    if (newMode === state.mode) return;
    if (newMode === 'compose' || newMode === 'compose-js') {
      if (state.mode === 'decompose') {
        const d = decomposeHtml(state.decomposeInput, state.decomposeCssFilename, state.decomposeJsFilename, state.removeComments);
        state.composeHtml = d.html; state.composeCss = d.css;
        state.jsList = [{ id: Date.now(), content: d.js, filename: state.decomposeJsFilename }];
      }
    } else if (newMode === 'decompose') {
      if (state.mode === 'compose') {
        state.decomposeInput = composeHtml(state.composeHtml, state.composeCss, state.jsList, state.composeCssFilename, state.removeComments);
      }
    }
    state.mode = newMode;
    render();
  }

  function buildHeader() {
    const titleBlock = el('div', {}, [
      el('h1', { class:'title' }, [ el('span', { class:'logo' }, ICONS.app), 'HTML ToolKit' ]),
      el('p', { class:'subtitle' }, 'インラインHTMLの分解と、HTML/CSS/JSの結合を行うユーティリティ')
    ]);
    const cb = el('input', { type:'checkbox' }); cb.checked = state.removeComments;
    cb.addEventListener('change', () => { state.removeComments = cb.checked; updateOutputs(); });
    const commentToggle = el('label', { class:'toggle' }, [cb, 'コメント自動削除']);
    const themeBtn = el('button', { class:'icon-toggle', title:'テーマ切替' }, state.theme === 'dark' ? ICONS.sun : ICONS.moon);
    themeBtn.addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', state.theme);
      themeBtn.textContent = state.theme === 'dark' ? ICONS.sun : ICONS.moon;
    });
    const modes = el('div', { class:'modes' });
    [['decompose', ICONS.decompose, 'HTML分解'], ['compose', ICONS.compose, 'HTML結合'], ['compose-js', ICONS.composeJs, 'JSのみ結合']]
      .forEach(([m, ic, lbl]) => {
        const b = el('button', { class:'mode-btn' + (state.mode === m ? ' active' : '') }, [ el('span', {}, ic), lbl ]);
        b.addEventListener('click', () => handleModeToggle(m));
        modes.appendChild(b);
      });
    const controls = el('div', { class:'controls' }, [commentToggle, themeBtn, modes]);
    return el('div', { class:'header' }, [titleBlock, controls]);
  }

  function buildDecompose(grid) {
    grid.appendChild(EditorPanel({
      label:'入力HTML', icon: ICONS.input,
      filename: state.decomposeInputFilename, onFilename: (v) => { state.decomposeInputFilename = v; },
      initial: state.decomposeInput, placeholder:'ここに <style> や <script> を含むHTMLを貼り付けてください...',
      accept:'.html,.txt', className:'fill',
      onChange: (v) => { state.decomposeInput = v; updateOutputs(); },
      onImport: (content, name) => { state.decomposeInput = content; if (name) state.decomposeInputFilename = name; render(); updateOutputs(); }
    }));
    const col = el('div', { class:'col' });
    const dlAll = el('button', { class:'btn btn-blue', title:'3つのファイルを一括でダウンロード' }, [ el('span', {}, ICONS.output), '一括ダウンロード' ]);
    dlAll.addEventListener('click', () => {
      const d = decomposeHtml(state.decomposeInput, state.decomposeCssFilename, state.decomposeJsFilename, state.removeComments);
      if (d.html) downloadFile(state.decomposeHtmlFilename, d.html);
      if (d.css) setTimeout(() => downloadFile(state.decomposeCssFilename, d.css), 200);
      if (d.js) setTimeout(() => downloadFile(state.decomposeJsFilename, d.js), 400);
    });
    col.appendChild(el('div', { class:'col-head' }, [ el('span', { class:'label' }, '抽出されたファイル'), dlAll ]));
    col.appendChild(EditorPanel({ icon: ICONS.html, filename: state.decomposeHtmlFilename, onFilename: (v) => { state.decomposeHtmlFilename = v; updateOutputs(); }, readOnly:true, className:'flex1', compute: () => decomposeHtml(state.decomposeInput, state.decomposeCssFilename, state.decomposeJsFilename, state.removeComments).html }));
    col.appendChild(EditorPanel({ icon: ICONS.css, filename: state.decomposeCssFilename, onFilename: (v) => { state.decomposeCssFilename = v; updateOutputs(); }, readOnly:true, className:'flex1', compute: () => decomposeHtml(state.decomposeInput, state.decomposeCssFilename, state.decomposeJsFilename, state.removeComments).css }));
    col.appendChild(EditorPanel({ icon: ICONS.js, filename: state.decomposeJsFilename, onFilename: (v) => { state.decomposeJsFilename = v; updateOutputs(); }, readOnly:true, className:'flex1', compute: () => decomposeHtml(state.decomposeInput, state.decomposeCssFilename, state.decomposeJsFilename, state.removeComments).js }));
    grid.appendChild(col);
  }

  function buildJsToolbar(accept) {
    const sortBtn = el('button', { class:'btn btn-soft', title:'JSのimport文を解析して依存関係の順に並び替えます' }, [ el('span', {}, ICONS.sort), '自動並び替え' ]);
    if (state.jsList.length <= 1) sortBtn.disabled = true;
    sortBtn.addEventListener('click', () => { state.jsList = sortJsList(state.jsList); render(); updateOutputs(); });
    const bulkFile = el('input', { class:'hidden', type:'file', multiple:'', accept });
    bulkFile.addEventListener('change', (e) => handleBulkImport(e));
    const bulkBtn = el('button', { class:'btn btn-green', title:'複数ファイルをまとめて読み込みます' }, [ el('span', {}, ICONS.bulk), '一括インポート' ]);
    bulkBtn.addEventListener('click', () => bulkFile.click());
    return el('div', { class:'controls' }, [sortBtn, bulkBtn, bulkFile]);
  }

  function jsPanel(js, index) {
    return EditorPanel({
      icon: ICONS.js, filename: js.filename, onFilename: (v) => updateJsFilename(js.id, v),
      initial: js.content, placeholder:'JavaScriptコードを入力...', accept:'.js,.txt', className:'block',
      showRemove: state.jsList.length > 1, onRemove: () => removeJsPanel(js.id),
      showUp: index > 0, onUp: () => moveJsPanel(index, 'up'),
      showDown: index < state.jsList.length - 1, onDown: () => moveJsPanel(index, 'down'),
      onChange: (v) => updateJs(js.id, v),
      onImport: (c, n) => updateJsAndSort(js.id, c, n)
    });
  }

  function buildCompose(grid) {
    const col = el('div', { class:'col scroll' });
    col.appendChild(el('div', { class:'col-head' }, [ el('span', { class:'label' }, '結合するファイル群'), buildJsToolbar('.html,.css,.js,.txt') ]));
    col.appendChild(EditorPanel({ icon: ICONS.html, filename: state.composeHtmlFilename, onFilename: (v) => { state.composeHtmlFilename = v; updateOutputs(); }, initial: state.composeHtml, placeholder:'HTMLコードを入力...', accept:'.html,.txt', className:'block', onChange: (v) => { state.composeHtml = v; updateOutputs(); }, onImport: (c, n) => { state.composeHtml = c; if (n) state.composeHtmlFilename = n; render(); updateOutputs(); } }));
    col.appendChild(EditorPanel({ icon: ICONS.css, filename: state.composeCssFilename, onFilename: (v) => { state.composeCssFilename = v; updateOutputs(); }, initial: state.composeCss, placeholder:'CSSコードを入力...', accept:'.css,.txt', className:'block', onChange: (v) => { state.composeCss = v; updateOutputs(); }, onImport: (c, n) => { state.composeCss = c; if (n) state.composeCssFilename = n; render(); updateOutputs(); } }));
    state.jsList.forEach((js, index) => col.appendChild(jsPanel(js, index)));
    const addBtn = el('button', { class:'addbtn' }, [ el('span', {}, ICONS.add), 'JavaScriptファイルを追加' ]);
    addBtn.addEventListener('click', addJsPanel);
    col.appendChild(addBtn);
    grid.appendChild(col);
    grid.appendChild(EditorPanel({ label:'出力HTML', icon: ICONS.output, filename: state.composeOutputFilename, onFilename: (v) => { state.composeOutputFilename = v; }, readOnly:true, className:'fill', compute: () => composeHtml(state.composeHtml, state.composeCss, state.jsList, state.composeCssFilename, state.removeComments) }));
  }

  function buildComposeJs(grid) {
    const col = el('div', { class:'col scroll' });
    col.appendChild(el('div', { class:'col-head' }, [ el('span', { class:'label' }, '結合するJSファイル群'), buildJsToolbar('.js,.txt') ]));
    state.jsList.forEach((js, index) => col.appendChild(jsPanel(js, index)));
    const addBtn = el('button', { class:'addbtn' }, [ el('span', {}, ICONS.add), 'JavaScriptファイルを追加' ]);
    addBtn.addEventListener('click', addJsPanel);
    col.appendChild(addBtn);
    grid.appendChild(col);
    grid.appendChild(EditorPanel({ label:'出力JS', icon: ICONS.js, filename: state.composeJsOutputFilename, onFilename: (v) => { state.composeJsOutputFilename = v; }, readOnly:true, className:'fill', compute: () => composeJs(state.jsList, state.removeComments) }));
  }

  function render() {
    currentPanels = [];
    const root = document.getElementById('app');
    root.innerHTML = '';
    const wrap = el('div', { class:'wrap' });
    wrap.appendChild(buildHeader());
    const grid = el('div', { class:'grid' });
    if (state.mode === 'decompose') buildDecompose(grid);
    else if (state.mode === 'compose') buildCompose(grid);
    else buildComposeJs(grid);
    wrap.appendChild(grid);
    root.appendChild(wrap);
  }

  /* ===== App ===== */
  function init() {
    document.documentElement.setAttribute('data-theme', state.theme);
    render();
    updateOutputs();
  }
  init();
})();
</script>
</body>
</html>
